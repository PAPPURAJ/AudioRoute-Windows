name: Create Release Tag

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: Version increment type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUMP: ${{ inputs.bump }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            bump_type="$INPUT_BUMP"
          else
            bump_type="patch"

            if printf '%s' "$HEAD_COMMIT_MESSAGE" | grep -Eiq '(\[major\]|#major)'; then
              bump_type="major"
            elif printf '%s' "$HEAD_COMMIT_MESSAGE" | grep -Eiq '(\[minor\]|#minor)'; then
              bump_type="minor"
            fi
          fi

          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            major=1
            minor=0
            patch=0
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
          fi

          case "$bump_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: $bump_type"
              exit 1
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"

          echo "bump_type=${bump_type}" >> "$GITHUB_OUTPUT"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Summary
        run: |
          echo "Created tag ${{ steps.version.outputs.tag }} using ${{ steps.version.outputs.bump_type }} bump" >> "$GITHUB_STEP_SUMMARY"
