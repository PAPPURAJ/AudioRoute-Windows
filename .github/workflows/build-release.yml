name: Build Release Assets

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Prepare signing certificate
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' }}
        id: signing
        shell: powershell
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}"))
          "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Resolve release version
        id: version
        shell: powershell
        run: |
          $tag = "${env:GITHUB_REF_NAME}"

          if (-not $tag.StartsWith("v")) {
              throw "Expected tag to start with 'v'."
          }

          $version = $tag.Substring(1)
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "portable_dir=dist/portable/win-x64-$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "portable_zip=dist/AudioRoute-win-x64-$version-portable.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_exe=dist/installer/AudioRoute-Setup-$version.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build portable and installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\Build-Installer.ps1 `
            -AppVersion "${{ steps.version.outputs.version }}" `
            -Version "${{ steps.version.outputs.version }}" `
            -OutputSuffix "${{ steps.version.outputs.version }}" `
            -SigningCertPath "${{ steps.signing.outputs.cert_path }}" `
            -SigningCertPassword "${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudioRoute-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.version.outputs.portable_dir }}/AudioRoute.exe
            ${{ steps.version.outputs.portable_zip }}
            ${{ steps.version.outputs.installer_exe }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.version.outputs.portable_dir }}/AudioRoute.exe
            ${{ steps.version.outputs.portable_zip }}
            ${{ steps.version.outputs.installer_exe }}
